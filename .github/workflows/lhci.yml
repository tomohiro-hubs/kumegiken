name: Lighthouse CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx --yes serve out -l 4173 &
      - run: npx --yes wait-on http://127.0.0.1:4173
      - name: Run Lighthouse CI
        run: |
          npx --yes @lhci/cli@0.15.x autorun \
            --collect.url=http://127.0.0.1:4173/ \
            --collect.url=http://127.0.0.1:4173/service/ \
            --assert.assertions.categories:performance=warn:0.6 \
            --assert.assertions.categories:seo=error:0.9 \
            --assert.assertions.categories:accessibility=warn:0.9
